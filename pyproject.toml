[project]
name = "metis"
version = "0.0.1"
description = "An agent harness for training efficient non-LLM models."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "textual>=0.60",      # TUI
    "anthropic>=0.40",    # first agent provider
    "pyyaml>=6.0",        # project/recipe config
    "pydantic>=2.0",      # schema validation
]

[project.optional-dependencies]
ml = [
    "torch",
    "scikit-learn",
    "numpy",
]
dev = [
    "ruff",
    "pytest",
]

[project.scripts]
metis = "metis.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metis"]

[tool.ruff]
line-length = 100
target-version = "py311"
