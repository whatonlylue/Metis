# Example project.yaml — what the agent writes during the DEFINE step.
# Copy/rename into projects/<name>/project.yaml for a real project.

name: flowers-5
description: Classify a photo as one of five flower species.
task_type: image_classification
classes: [daisy, dandelion, rose, sunflower, tulip]

target_metric: accuracy
rank_objective: pareto        # trade accuracy against efficiency
metric_weights: null

data_provided: false          # agent must source data itself

budgets:
  max_wall_clock_minutes: 120
  max_variants: 20
  max_dollars: null

status: defined
